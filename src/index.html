<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #0d1117; /* GitHub Dark */
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            padding: 20px;
        }
        .commit-box {
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            background-color: #161b22;
        }
        input {
            width: 100%;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: white;
            padding: 5px 12px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button {
            background-color: #238636;
            color: white;
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: 6px;
            padding: 5px 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background-color: #2ea043; }
    </style>
</head>
<body>
    <div class="commit-box">
        <input type="text" id="msg" placeholder="Commit message">
        <button onclick="pythonBridge.commit(document.getElementById('msg').value)">
            Commit to main
        </button>
    </div>
</body>
</html>
