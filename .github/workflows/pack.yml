name: Pack Extension

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-code: '20'

      - name: Install web-ext
        run: npm install --global web-ext

      - name: Lint Extension
        run: web-ext lint --source-dir ./extension # Adjust path if your manifest isn't in root

      - name: Build Extension Package
        run: |
          mkdir -p build
          web-ext build --source-dir ./extension --artifacts-dir ./build --overwrite-dest

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: githui-extension
          path: build/*.zip