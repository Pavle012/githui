name: Pack Extension

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - List Files
        run: ls -R

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web-ext
        run: npm install --global web-ext

      - name: Lint Extension
        # Use "." if your manifest.json is in the root of the repo
        run: web-ext lint --source-dir .

      - name: Build Extension Package
        run: |
          mkdir -p build
          # Using "." here too to pack the root files
          web-ext build --source-dir . --artifacts-dir ./build --overwrite-dest

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: githui-extension
          path: build/*.zip