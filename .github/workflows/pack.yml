name: Pack Extension

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find Manifest Directory
        # This finds the directory containing manifest.json, even if it's nested
        run: |
          MANIFEST_PATH=$(find . -name "manifest.json" -printf '%h\n' | head -n 1)
          echo "MANIFEST_DIR=$MANIFEST_PATH" >> $GITHUB_ENV
          echo "Found manifest in: $MANIFEST_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web-ext
        run: npm install --global web-ext

      - name: Lint and Build Extension
        run: |
          # Use the directory we found dynamically
          web-ext lint --source-dir ${{ env.MANIFEST_DIR }}
          mkdir -p build
          web-ext build --source-dir ${{ env.MANIFEST_DIR }} --artifacts-dir ./build --overwrite-dest

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: githui-extension
          path: build/*.zip